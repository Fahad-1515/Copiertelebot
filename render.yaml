services:
  - type: web
    name: telegram-forward-bot
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: ADMIN_LOG_GROUP_ID
        sync: false
    healthCheckPath: /
    autoDeploy: true
